<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#c73f85">
  <title>Pharsatify — ออฟไลน์</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:linear-gradient(145deg,#fffafd,#fcecf5);font-family:"Noto Sans Thai","Sarabun",Tahoma,sans-serif;color:#4a3042}
    .card{width:min(92vw,430px);padding:32px 24px;border-radius:30px;background:#fff;box-shadow:0 24px 70px rgba(118,52,91,.16);text-align:center}
    img{width:110px;height:110px;object-fit:contain}
    h1{margin:12px 0 6px;font-size:28px}
    p{margin:0;color:#776871;line-height:1.7}
    button{margin-top:20px;min-height:48px;padding:0 20px;border:0;border-radius:999px;background:linear-gradient(135deg,#c73f85,#8f4db1);color:#fff;font:inherit;font-weight:800;cursor:pointer}
  </style>
</head>
<body>
  <main class="card">
    <img src="./icon.svg" alt="Pharsatify">
    <h1>ยังไม่มีอินเทอร์เน็ต</h1>
    <p>กรุณาเชื่อมต่ออินเทอร์เน็ตก่อนส่งแบบประเมิน</p>
    <button onclick="location.reload()">ลองอีกครั้ง</button>
  </main>
</body>
</html>
