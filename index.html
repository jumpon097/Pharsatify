<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#c73f85">
  <meta name="description" content="Pharsatify แบบประเมินความพึงพอใจห้องยา โรงพยาบาลมะเร็งอุบลราชธานี">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Pharsatify">
  <title>Pharsatify | ประเมินความพึงพอใจห้องยา</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="./icon.svg">
  <link rel="apple-touch-icon" href="./icon.svg">
  <style>
    :root {
      color-scheme: light;
      --pink: #c73f85;
      --pink-dark: #a92e6d;
      --purple: #8f4db1;
      --ink: #4a3042;
      --muted: #776871;
    }
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #fff8fc;
      font-family: "Noto Sans Thai","Sarabun",Tahoma,Arial,sans-serif;
    }
    body {
      padding:
        env(safe-area-inset-top)
        env(safe-area-inset-right)
        env(safe-area-inset-bottom)
        env(safe-area-inset-left);
    }
    #appFrame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #fff8fc;
    }
    .loading {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 88% 8%, rgba(232,107,171,.22), transparent 28%),
        radial-gradient(circle at 10% 90%, rgba(143,77,177,.16), transparent 30%),
        linear-gradient(145deg,#fffafd,#fcecf5);
      transition: opacity .35s ease, visibility .35s ease;
    }
    .loading.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .loading-card {
      width: min(92vw, 430px);
      padding: 28px 24px;
      border: 1px solid rgba(199,63,133,.12);
      border-radius: 30px;
      background: rgba(255,255,255,.94);
      box-shadow: 0 24px 70px rgba(118,52,91,.16);
      text-align: center;
    }
    .brand {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      margin-bottom: 15px;
    }
    .brand img:first-child {
      width: 76px;
      height: 76px;
      object-fit: contain;
    }
    .brand img:last-child {
      width: 104px;
      height: 104px;
      object-fit: cover;
      border: 5px solid #fff;
      border-radius: 32px;
      box-shadow: 0 12px 30px rgba(199,63,133,.17);
      animation: bob 1.5s ease-in-out infinite;
    }
    @keyframes bob {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }
    h1 {
      margin: 0;
      color: var(--ink);
      font-size: 27px;
      line-height: 1.3;
    }
    p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.65;
      font-size: 14px;
    }
    .dots {
      margin-top: 17px;
      color: var(--pink);
      font-size: 22px;
      letter-spacing: 5px;
    }
    .dots span {
      display: inline-block;
      animation: blink 1.1s infinite;
    }
    .dots span:nth-child(2) { animation-delay: .18s; }
    .dots span:nth-child(3) { animation-delay: .36s; }
    @keyframes blink {
      0%,60%,100% { opacity:.25; transform:translateY(0); }
      30% { opacity:1; transform:translateY(-4px); }
    }
    .floating-button {
      position: fixed;
      z-index: 30;
      right: max(16px, env(safe-area-inset-right));
      bottom: max(16px, env(safe-area-inset-bottom));
      display: none;
      align-items: center;
      gap: 8px;
      min-height: 48px;
      padding: 0 17px;
      border: 0;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(135deg,var(--pink),var(--purple));
      box-shadow: 0 12px 30px rgba(169,46,109,.28);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }
    .network {
      position: fixed;
      z-index: 40;
      left: 50%;
      top: max(12px, env(safe-area-inset-top));
      transform: translate(-50%,-150%);
      padding: 8px 13px;
      border-radius: 999px;
      color: #fff;
      background: #7f1d1d;
      box-shadow: 0 8px 24px rgba(0,0,0,.16);
      font-size: 13px;
      font-weight: 800;
      transition: transform .25s ease;
      white-space: nowrap;
    }
    .network.show { transform: translate(-50%,0); }
    .fallback {
      position: fixed;
      z-index: 25;
      left: 50%;
      bottom: max(16px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      display: none;
      width: min(92vw, 420px);
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,.97);
      box-shadow: 0 12px 34px rgba(80,38,63,.18);
      text-align: center;
      color: var(--ink);
      font-size: 13px;
    }
    .fallback a {
      display: inline-block;
      margin-top: 8px;
      padding: 9px 15px;
      border-radius: 999px;
      color: #fff;
      background: var(--pink);
      text-decoration: none;
      font-weight: 800;
    }
  </style>
</head>

      <h1>ให้คะแนนห้องยา</h1>
      <p>กำลังเปิดแบบประเมินความพึงพอใจห้องยา</p>
      <div class="dots" aria-label="กำลังโหลด"><span>•</span><span>•</span><span>•</span></div>
    </div>
  </div>

  <iframe
    id="appFrame"
    title="แบบประเมินความพึงพอใจห้องยา"
    src="https://script.google.com/macros/s/AKfycbxt6Y54lZn34es23XNjf7Opmw2PmeoaJVO1Ffdu44byMw9hOKSzCym-9yDggtqJ6kv-lw/exec"
    allow="clipboard-read; clipboard-write"
    referrerpolicy="strict-origin-when-cross-origin">
  </iframe>

  <button id="installButton" class="floating-button" type="button">📲 ติดตั้ง Pharsatify</button>

  <div id="fallback" class="fallback">
    หากหน้าประเมินไม่แสดง สามารถเปิดหน้า GAS โดยตรงได้
    <br><a href="https://script.google.com/macros/s/AKfycbxt6Y54lZn34es23XNjf7Opmw2PmeoaJVO1Ffdu44byMw9hOKSzCym-9yDggtqJ6kv-lw/exec" target="_blank" rel="noopener">เปิดแบบประเมิน</a>
  </div>

  <script>
    const loading = document.getElementById('loading');
    const frame = document.getElementById('appFrame');
    const fallback = document.getElementById('fallback');
    const network = document.getElementById('network');
    const installButton = document.getElementById('installButton');
    let deferredPrompt = null;
    let frameLoaded = false;

    frame.addEventListener('load', () => {
      frameLoaded = true;
      window.setTimeout(() => loading.classList.add('is-hidden'), 250);
    });

    window.setTimeout(() => {
      if (!frameLoaded) {
        loading.classList.add('is-hidden');
        fallback.style.display = 'block';
      }
    }, 12000);

    function updateNetwork() {
      network.classList.toggle('show', !navigator.onLine);
    }
    window.addEventListener('online', () => {
      updateNetwork();
      frame.src = frame.src;
    });
    window.addEventListener('offline', updateNetwork);
    updateNetwork();

    window.addEventListener('beforeinstallprompt', event => {
      event.preventDefault();
      deferredPrompt = event;
      installButton.style.display = 'flex';
    });

    installButton.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installButton.style.display = 'none';
    });

    window.addEventListener('appinstalled', () => {
      installButton.style.display = 'none';
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .catch(error => console.warn('Service worker:', error));
      });
    }
  </script>
